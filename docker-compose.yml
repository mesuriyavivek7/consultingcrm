services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Passed to the builder stage so NEXT_PUBLIC_ vars are baked into the bundle
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:5090/api/v1}
    image: consultingcrm-frontend
    container_name: consultingcrm-frontend
    restart: unless-stopped
    ports:
      - "3008:3008"
    environment:
      # Runtime env vars (secrets go here, not in the image)
      NODE_ENV: production
      PORT: 3008
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3008}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:5090/api/v1}
